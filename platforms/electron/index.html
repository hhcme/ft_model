<!DOCTYPE html>
<html>
<head>
  <title>CAD Engine Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 14px;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    #fileInput {
      color: #e0e0e0;
    }
    #status {
      color: #a0d0ff;
    }
    cad-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <input type="file" id="fileInput" accept=".dxf" />
    <span id="status">Ready</span>
  </div>
  <cad-canvas id="viewer"></cad-canvas>
  <script type="module" src="./src/js/demo.ts"></script>
</body>
</html>
